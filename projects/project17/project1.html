<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto 1</title>
    <link rel="stylesheet" href="project1.css">
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css"/>
</head>
<body>
    <div class="swiper-container">
        <div class="swiper-wrapper">
            <!-- Sección 1: Subsecciones -->
            <div class="swiper-slide">
                <header>Equipo Proyecto 1</header>
                <main>
                    <div class="subsections">
                        <!-- Subsección Izquierda -->
                        <div class="subsection left">
                            <div id="memoria-content">Cargando memoria...</div>
                        </div>
                        <!-- Subsección Derecha -->
                        <div class="subsection right">
                            <div class="gallery-grid">
                                <!-- Imágenes -->
                                <a href="img1.jpg" class="gallery-item" style="grid-area: img1;">
                                    <img src="img1.jpg" alt="Imagen 1">
                                </a>
                                <a href="img2.jpg" class="gallery-item" style="grid-area: img2;">
                                    <img src="img2.jpg" alt="Imagen 2">
                                </a>
                                <!-- Más imágenes -->
                            </div>
                        </div>
                    </div>
                </main>
                <footer>
                    <div class="dropdown">
                        <button class="btn-contact">Contacto</button>
                        <div class="dropdown-content">
                            <a href="#">Opción 1</a>
                            <a href="#">Opción 2</a>
                            <a href="#">Opción 3</a>
                        </div>
                    </div>
                </footer>
            </div>

            <!-- Sección 2: Galería 1 -->
            <div class="swiper-slide">
                <header>Galería 1</header>
                <main>
                    <div class="gallery">
                        <a href="img13.jpg" class="gallery-item">
                            <img src="img13.jpg" alt="Imagen 13">
                        </a>
                        <a href="img14.jpg" class="gallery-item">
                            <img src="img14.jpg" alt="Imagen 14">
                        </a>
                        <a href="img15.jpg" class="gallery-item">
                            <img src="img15.jpg" alt="Imagen 15">
                        </a>
                        <a href="img16.jpg" class="gallery-item">
                            <img src="img16.jpg" alt="Imagen 16">
                        </a>
                    </div>
                </main>
                <footer>
                    <div class="dropdown">
                        <button class="btn-contact">Contacto</button>
                        <div class="dropdown-content">
                            <a href="#">Opción 1</a>
                            <a href="#">Opción 2</a>
                            <a href="#">Opción 3</a>
                        </div>
                    </div>
                </footer>
            </div>

            <!-- Sección 3: Galería 2 -->
            <div class="swiper-slide">
                <header>Galería 2</header>
                <main>
                    <div class="gallery">
                        <a href="img17.jpg" class="gallery-item">
                            <img src="img17.jpg" alt="Imagen 17">
                        </a>
                        <a href="img18.jpg" class="gallery-item">
                            <img src="img18.jpg" alt="Imagen 18">
                        </a>
                        <a href="img19.jpg" class="gallery-item">
                            <img src="img19.jpg" alt="Imagen 19">
                        </a>
                        <a href="img20.jpg" class="gallery-item">
                            <img src="img20.jpg" alt="Imagen 20">
                        </a>
                    </div>
                </main>
                <footer>
                    <div class="dropdown">
                        <button class="btn-contact">Contacto</button>
                        <div class="dropdown-content">
                            <a href="#">Opción 1</a>
                            <a href="#">Opción 2</a>
                            <a href="#">Opción 3</a>
                        </div>
                    </div>
                </footer>
            </div>
        </div>
        <!-- Paginación de Swiper -->
        <div class="swiper-pagination"></div>
    </div>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
